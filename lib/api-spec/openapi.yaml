openapi: 3.1.0
info:
  title: API
  version: 1.0.0
servers:
  - url: /api

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      summary: Login with email and password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      summary: Logout current user
      tags: [auth]
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      summary: Get current user
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      operationId: register
      summary: Register as a client
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
        "409":
          description: Email already in use

  /client/profile:
    get:
      operationId: getClientProfile
      summary: Get client's own profile and lead data
      tags: [client]
      responses:
        "200":
          description: Client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
        "401":
          description: Unauthorized
    put:
      operationId: updateClientProfile
      summary: Update client's financial data
      tags: [client]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"

  /notifications:
    get:
      operationId: getNotifications
      summary: Get all notifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications list with unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResult"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      tags: [notifications]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      summary: Mark a single notification as read
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /properties:
    get:
      operationId: getProperties
      summary: List properties (marketplace)
      tags: [properties]
      parameters:
        - name: city
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: status
          in: query
          schema: { type: string }
        - name: brokerId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Properties list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      summary: Create a new property listing
      tags: [properties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyRequest"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"

  /properties/{id}:
    get:
      operationId: getProperty
      summary: Get a single property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found
    patch:
      operationId: updateProperty
      summary: Update a property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyRequest"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
    delete:
      operationId: deleteProperty
      summary: Delete a property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /properties/{id}/interest:
    post:
      operationId: togglePropertyInterest
      summary: Toggle client interest in a property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Interest toggled
          content:
            application/json:
              schema:
                type: object
                required: [interested]
                properties:
                  interested: { type: boolean }

  /properties/interests/me:
    get:
      operationId: getMyInterests
      summary: Get properties the current client has shown interest in
      tags: [properties]
      responses:
        "200":
          description: List of interested property IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /subscriptions/me:
    get:
      operationId: getMySubscription
      summary: Get current user subscription
      tags: [subscriptions]
      responses:
        "200":
          description: Subscription info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          description: No subscription found

  /subscriptions:
    get:
      operationId: getAllSubscriptions
      summary: Admin — list all subscriptions
      tags: [subscriptions]
      responses:
        "200":
          description: All subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"
    post:
      operationId: createSubscription
      summary: Create subscription for a user
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/{id}:
    patch:
      operationId: updateSubscription
      summary: Admin — update subscription status or plan
      tags: [subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionRequest"
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /dashboard:
    get:
      operationId: getDashboard
      summary: Get dashboard summary stats
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /leads:
    get:
      operationId: getLeads
      summary: List all leads
      tags: [leads]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, analyzing, approved, rejected, in_progress]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"
    post:
      operationId: createLead
      summary: Create a new lead
      tags: [leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      summary: Get lead by ID
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found
    put:
      operationId: updateLead
      summary: Update a lead
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadRequest"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      summary: Delete a lead
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Lead deleted

  /brokers:
    get:
      operationId: getBrokers
      summary: List all brokers/correspondents
      tags: [brokers]
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of brokers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Broker"
    post:
      operationId: createBroker
      summary: Create a new broker
      tags: [brokers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrokerRequest"
      responses:
        "201":
          description: Broker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"

  /brokers/{id}:
    get:
      operationId: getBroker
      summary: Get broker by ID
      tags: [brokers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broker details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
    put:
      operationId: updateBroker
      summary: Update a broker
      tags: [brokers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrokerRequest"
      responses:
        "200":
          description: Broker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"

  /leads/{id}/enrich:
    put:
      operationId: enrichLead
      summary: Save Caixa/bureau enrichment data and recalculate score
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaixaEnrichRequest"
      responses:
        "200":
          description: Lead updated with enrichment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found

  /leads/{id}/score:
    get:
      operationId: getLeadScore
      summary: Get AI credit score analysis for a lead
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Score details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditScore"

  /funnel:
    get:
      operationId: getApprovalFunnel
      summary: Get approval funnel data
      tags: [dashboard]
      responses:
        "200":
          description: Approval funnel stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalFunnel"

  /ranking/brokers:
    get:
      operationId: getBrokerRanking
      summary: Get broker performance ranking
      tags: [dashboard]
      responses:
        "200":
          description: Broker ranking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerRanking"

  /ranking/leads:
    get:
      operationId: getLeadRanking
      summary: Get top leads ranked by approval chance
      tags: [dashboard]
      responses:
        "200":
          description: Lead ranking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadRanking"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResult:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, broker, analyst, client]
        avatarUrl:
          type: string
          nullable: true
        leadId:
          type: integer
          nullable: true

    RegisterRequest:
      type: object
      required: [name, cpf, email, phone, password, income, propertyValue]
      properties:
        name:
          type: string
        cpf:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
        income:
          type: number
        propertyValue:
          type: number

    UpdateClientProfileRequest:
      type: object
      properties:
        income:
          type: number
        propertyValue:
          type: number
        phone:
          type: string
        name:
          type: string

    ClientProfile:
      type: object
      required: [user, lead]
      properties:
        user:
          $ref: "#/components/schemas/User"
        lead:
          $ref: "#/components/schemas/Lead"

    MaritalStatus:
      type: string
      enum: [solteiro, casado, divorciado, viuvo, uniao_estavel]

    EmploymentType:
      type: string
      enum: [clt, autonomo, servidor_publico, empresario, aposentado, liberal, desempregado]

    PropertyType:
      type: string
      enum: [novo, usado, construcao, terreno]

    Lead:
      type: object
      required: [id, name, cpf, email, phone, income, propertyValue, status, approvalChance, scoreCaixa, scoreMCMV, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        cpf:
          type: string
        email:
          type: string
        phone:
          type: string
        birthDate:
          type: string
          nullable: true
          description: Date of birth YYYY-MM-DD
        maritalStatus:
          $ref: "#/components/schemas/MaritalStatus"
          nullable: true
        profession:
          type: string
          nullable: true
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
          nullable: true
        employmentMonths:
          type: integer
          nullable: true
          description: Months in current job
        income:
          type: number
          description: Monthly formal income in BRL
        informalIncome:
          type: number
          nullable: true
          description: Monthly informal/complementary income in BRL
        hasFgts:
          type: boolean
          nullable: true
        fgtsBalance:
          type: number
          nullable: true
          description: Estimated FGTS balance in BRL
        propertyValue:
          type: number
          description: Desired property value in BRL
        propertyType:
          $ref: "#/components/schemas/PropertyType"
          nullable: true
        propertyCity:
          type: string
          nullable: true
        propertyState:
          type: string
          nullable: true
          description: Brazilian state abbreviation e.g. SP
        spouseName:
          type: string
          nullable: true
        spouseCpf:
          type: string
          nullable: true
        spouseBirthDate:
          type: string
          nullable: true
        spouseProfession:
          type: string
          nullable: true
        spouseIncome:
          type: number
          nullable: true
        status:
          type: string
          enum: [pending, analyzing, approved, rejected, in_progress]
        approvalChance:
          type: number
          description: AI approval probability 0-100
        scoreCaixa:
          type: integer
          description: Caixa Econômica credit score
        scoreMCMV:
          type: integer
          description: Minha Casa Minha Vida eligibility score
        brokerId:
          type: integer
          nullable: true
        brokerName:
          type: string
          nullable: true
        aiRecommendation:
          type: string
          nullable: true
        serasaScore:
          type: integer
          nullable: true
          description: Serasa Score consultado (0-1000)
        hasNegativations:
          type: boolean
          nullable: true
        negativationsValue:
          type: number
          nullable: true
          description: Valor total de negativações em BRL
        hasProtests:
          type: boolean
          nullable: true
        protestsValue:
          type: number
          nullable: true
          description: Valor total de protestos em cartório em BRL
        siricStatus:
          type: string
          nullable: true
          enum: [regular, irregular, pendente]
          description: Status no SIRIC (sistema Caixa)
        siricObservation:
          type: string
          nullable: true
          description: Observações do SIRIC
        fgtsMonths:
          type: integer
          nullable: true
          description: Meses de contribuição ao FGTS
        fgtsMonthlyAvg:
          type: number
          nullable: true
          description: Depósito médio mensal no FGTS em BRL
        caixaScoreReal:
          type: integer
          nullable: true
          description: Score real consultado no sistema Caixa (override do calculado)
        enrichedAt:
          type: string
          format: date-time
          nullable: true
          description: Data/hora do enriquecimento
        enrichedBy:
          type: string
          nullable: true
          description: Nome do responsável pelo enriquecimento
        vehicleLoanMonthly:
          type: number
          nullable: true
          description: Parcela mensal de financiamento de veículo (R$/mês)
        creditCardLimit:
          type: number
          nullable: true
          description: Limite total de cartões de crédito (R$)
        creditCardUsage:
          type: number
          nullable: true
          description: Utilização atual do cartão de crédito (0-100 %)
        otherLoansMonthly:
          type: number
          nullable: true
          description: Outras parcelas mensais (CDC, empréstimos pessoais, consignado, R$/mês)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CaixaEnrichRequest:
      type: object
      properties:
        serasaScore:
          type: integer
          nullable: true
        hasNegativations:
          type: boolean
          nullable: true
        negativationsValue:
          type: number
          nullable: true
        hasProtests:
          type: boolean
          nullable: true
        protestsValue:
          type: number
          nullable: true
        siricStatus:
          type: string
          nullable: true
          enum: [regular, irregular, pendente]
        siricObservation:
          type: string
          nullable: true
        fgtsMonths:
          type: integer
          nullable: true
        fgtsMonthlyAvg:
          type: number
          nullable: true
        caixaScoreReal:
          type: integer
          nullable: true
        enrichedBy:
          type: string
          nullable: true
        vehicleLoanMonthly:
          type: number
          nullable: true
          description: Parcela mensal de financiamento de veículo (R$/mês)
        creditCardLimit:
          type: number
          nullable: true
          description: Limite total de cartões de crédito (R$)
        creditCardUsage:
          type: number
          nullable: true
          description: Utilização atual do cartão de crédito (0-100 %)
        otherLoansMonthly:
          type: number
          nullable: true
          description: Outras parcelas mensais (CDC, empréstimos pessoais, R$/mês)

    CreateLeadRequest:
      type: object
      required: [name, cpf, email, phone, income, propertyValue]
      properties:
        name:
          type: string
        cpf:
          type: string
        email:
          type: string
        phone:
          type: string
        birthDate:
          type: string
          nullable: true
        maritalStatus:
          $ref: "#/components/schemas/MaritalStatus"
          nullable: true
        profession:
          type: string
          nullable: true
        employmentType:
          $ref: "#/components/schemas/EmploymentType"
          nullable: true
        employmentMonths:
          type: integer
          nullable: true
        income:
          type: number
        informalIncome:
          type: number
          nullable: true
        hasFgts:
          type: boolean
          nullable: true
        fgtsBalance:
          type: number
          nullable: true
        propertyValue:
          type: number
        propertyType:
          $ref: "#/components/schemas/PropertyType"
          nullable: true
        propertyCity:
          type: string
          nullable: true
        propertyState:
          type: string
          nullable: true
        spouseName:
          type: string
          nullable: true
        spouseCpf:
          type: string
          nullable: true
        spouseBirthDate:
          type: string
          nullable: true
        spouseProfession:
          type: string
          nullable: true
        spouseIncome:
          type: number
          nullable: true
        brokerId:
          type: integer
          nullable: true

    UpdateLeadRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        income:
          type: number
        propertyValue:
          type: number
        status:
          type: string
          enum: [pending, analyzing, approved, rejected, in_progress]
        brokerId:
          type: integer
          nullable: true

    LeadList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Broker:
      type: object
      required: [id, name, email, phone, creci, status, totalLeads, approvedLeads, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        creci:
          type: string
          description: CRECI broker registration number
        status:
          type: string
          enum: [active, inactive]
        totalLeads:
          type: integer
        approvedLeads:
          type: integer
        approvalRate:
          type: number
        createdAt:
          type: string
          format: date-time

    CreateBrokerRequest:
      type: object
      required: [name, email, phone, creci]
      properties:
        name:
          type: string
        email:
