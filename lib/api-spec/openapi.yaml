openapi: 3.1.0
info:
  title: API
  version: 1.0.0
servers:
  - url: /api

paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [health]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      summary: Login with email and password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      summary: Logout current user
      tags: [auth]
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      summary: Get current user
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      operationId: register
      summary: Register as a client
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
        "409":
          description: Email already in use

  /client/profile:
    get:
      operationId: getClientProfile
      summary: Get client's own profile and lead data
      tags: [client]
      responses:
        "200":
          description: Client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"
        "401":
          description: Unauthorized
    put:
      operationId: updateClientProfile
      summary: Update client's financial data
      tags: [client]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientProfile"

  /client/banks-and-correspondents:
    get:
      operationId: getBanksAndCorrespondents
      summary: Banks eligible for this client + correspondents list + current linkage
      tags: [client]
      responses:
        "200":
          description: Bank options, correspondents and current link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BanksAndCorrespondentsResponse"
        "401":
          description: Unauthorized

  /client/choose-financing:
    post:
      operationId: chooseFinancing
      summary: Client picks bank and correspondent for their financing
      tags: [client]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChooseFinancingRequest"
      responses:
        "200":
          description: Updated linkage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BanksAndCorrespondentsResponse"
        "400":
          description: Invalid input

  /notifications:
    get:
      operationId: getNotifications
      summary: Get all notifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications list with unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResult"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      tags: [notifications]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      summary: Mark a single notification as read
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /properties:
    get:
      operationId: getProperties
      summary: List properties (marketplace)
      tags: [properties]
      parameters:
        - name: city
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: status
          in: query
          schema: { type: string }
        - name: brokerId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Properties list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      summary: Create a new property listing
      tags: [properties]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyRequest"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"

  /properties/{id}:
    get:
      operationId: getProperty
      summary: Get a single property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found
    patch:
      operationId: updateProperty
      summary: Update a property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyRequest"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
    delete:
      operationId: deleteProperty
      summary: Delete a property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }

  /properties/{id}/interest:
    post:
      operationId: togglePropertyInterest
      summary: Toggle client interest in a property
      tags: [properties]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Interest toggled
          content:
            application/json:
              schema:
                type: object
                required: [interested]
                properties:
                  interested: { type: boolean }

  /properties/interests/me:
    get:
      operationId: getMyInterests
      summary: Get properties the current client has shown interest in
      tags: [properties]
      responses:
        "200":
          description: List of interested property IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer

  /subscriptions/me:
    get:
      operationId: getMySubscription
      summary: Get current user subscription
      tags: [subscriptions]
      responses:
        "200":
          description: Subscription info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          description: No subscription found

  /subscriptions:
    get:
      operationId: getAllSubscriptions
      summary: Admin — list all subscriptions
      tags: [subscriptions]
      responses:
        "200":
          description: All subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscription"
    post:
      operationId: createSubscription
      summary: Create subscription for a user
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionRequest"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/{id}:
    patch:
      operationId: updateSubscription
      summary: Admin — update subscription status or plan
      tags: [subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSubscriptionRequest"
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /ratings/me:
    get:
      operationId: getMyRatings
      summary: Get ratings received by current user
      tags: [ratings]
      responses:
        "200":
          description: Ratings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingSummary"

  /ratings/user/{userId}:
    get:
      operationId: getRatingsByUser
      summary: Get ratings received by a specific user
      tags: [ratings]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Ratings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingSummary"

  /ratings:
    post:
      operationId: createRating
      summary: Create a rating for a broker or correspondent
      tags: [ratings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRatingRequest"
      responses:
        "201":
          description: Rating created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rating"

  /sales-history/me:
    get:
      operationId: getMySalesHistory
      summary: Get my sales/contract history
      tags: [salesHistory]
      responses:
        "200":
          description: Sales history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleHistory"

  /sales-history/user/{userId}:
    get:
      operationId: getSalesHistoryByUser
      summary: Get sales history for a specific user
      tags: [salesHistory]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Sales history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleHistory"

  /sales-history:
    get:
      operationId: getAllSalesHistory
      summary: Admin — all sales history
      tags: [salesHistory]
      responses:
        "200":
          description: All sales history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SaleHistory"
    post:
      operationId: createSale
      summary: Create a sale/contract record
      tags: [salesHistory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleRequest"
      responses:
        "201":
          description: Sale created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleHistory"

  /sales-history/{id}:
    patch:
      operationId: updateSale
      summary: Advance sale stage or update details
      tags: [salesHistory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSaleRequest"
      responses:
        "200":
          description: Updated sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleHistory"

  /dashboard:
    get:
      operationId: getDashboard
      summary: Get dashboard summary stats
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /leads:
    get:
      operationId: getLeads
      summary: List all leads
      tags: [leads]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, analyzing, approved, rejected, in_progress]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"
    post:
      operationId: createLead
      summary: Create a new lead
      tags: [leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      summary: Get lead by ID
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found
    put:
      operationId: updateLead
      summary: Update a lead
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadRequest"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      summary: Delete a lead
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Lead deleted

  /brokers:
    get:
      operationId: getBrokers
      summary: List all brokers/correspondents
      tags: [brokers]
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of brokers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Broker"
    post:
      operationId: createBroker
      summary: Create a new broker
      tags: [brokers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrokerRequest"
      responses:
        "201":
          description: Broker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"

  /brokers/{id}:
    get:
      operationId: getBroker
      summary: Get broker by ID
      tags: [brokers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Broker details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"
    put:
      operationId: updateBroker
      summary: Update a broker
      tags: [brokers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrokerRequest"
      responses:
        "200":
          description: Broker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Broker"

  /leads/{id}/enrich:
    put:
      operationId: enrichLead
      summary: Save Caixa/bureau enrichment data and recalculate score
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaixaEnrichRequest"
      responses:
        "200":
          description: Lead updated with enrichment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Lead not found

  /leads/{id}/score:
    get:
      operationId: getLeadScore
      summary: Get AI credit score analysis for a lead
      tags: [leads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Score details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditScore"

  /funnel:
    get:
      operationId: getApprovalFunnel
      summary: Get approval funnel data
      tags: [dashboard]
      responses:
        "200":
          description: Approval funnel stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalFunnel"

  /ranking/brokers:
    get:
      operationId: getBrokerRanking
      summary: Get broker performance ranking
      tags: [dashboard]
      responses:
        "200":
          description: Broker ranking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrokerRanking"

  /ranking/leads:
    get:
      operationId: getLeadRanking
      summary: Get top leads ranked by approval chance
      tags: [dashboard]
      responses:
        "200":
          description: Lead ranking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadRanking"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'

  /correspondent/processes:
    get:
      tags: [processes]
      operationId: listProcesses
      summary: List leads in the correspondent pipeline
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [analise, aprovacao, engenharia, conformidade, assinatura, concluido]
      responses:
        '200':
          description: Process list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessSummary'

  /correspondent/processes/{leadId}:
    get:
      tags: [processes]
      operationId: getProcess
      parameters:
        - name: leadId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Process detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDetail'

  /correspondent/processes/{leadId}/stage:
    put:
      tags: [processes]
      operationId: changeProcessStage
      parameters:
        - name: leadId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeStageRequest'
      responses:
        '200':
          description: Stage updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDetail'

  /correspondent/processes/{leadId}/documents:
    post:
      tags: [processes]
      operationId: registerProcessDocument
      parameters:
        - name: leadId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDocumentRequest'
      responses:
        '201':
          description: Document registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDocument'

  /correspondent/processes/{leadId}/documents/{docId}:
    put:
      tags: [processes]
      operationId: updateProcessDocument
      parameters:
        - name: leadId
          in: path
          required: true
          schema: { type: integer }
        - name: docId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
      responses:
        '200':
          description: Document updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessDocument'
    delete:
      tags: [processes]
      operationId: deleteProcessDocument
      parameters:
        - name: leadId
          in: path
          required: true
          schema: { type: integer }
        - name: docId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Deleted
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          description: E-mail ou CPF (apenas dígitos, 11 caracteres)
        password:
          type: string
        profile:
          type: string
          enum: [client, broker, correspondent]
          description: Perfil escolhido na aba do login. Se "broker" ou "correspondent", exige campos extras.
        cpf:
          type: string
          description: CPF do corretor (apenas dígitos, 11) — obrigatório quando profile=broker.
        creci:
          type: string
          description: CRECI do corretor — obrigatório quando profile=broker.
        cnpj:
          type: string
          description: CNPJ do correspondente (apenas dígitos, 14) — obrigatório quando profile=correspondent.
        ccaCode:
          type: string
          description: Código CCA do correspondente Caixa — obrigatório quando profile=correspondent.

    AuthResult:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, broker, analyst, client, correspondent]
        avatarUrl:
          type: string
          nullable: true
        leadId:
          type: integer
          nullable: true

    RegisterRequest:
      type: object
      required: [name, email, phone, password]
      properties:
        role:
          type: string
          enum: [client, broker, correspondent]
        plan:
          type: string
        name:
          type: string
        cpf:
          type: string
          description: Apenas dígitos. Obrigatório para client e broker.
        cnpj:
          type: string
          description: Apenas dígitos (14). Obrigatório para correspondent.
        creci:
          type: string
          description: Obrigatório para broker.
        ccaCode:
          type: string
          description: Obrigatório para correspondent.
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
        income:
          type: number
        propertyValue:
          type: number

    UpdateClientProfileRequest:
      type: object
      properties:
        income:
          type: number
        propertyValue:
          type: number
        phone:
          type: string
        name:
          type: string
        residentCity:
          type: string
          nullable: true
        residentState:
          type: string
          nullable: true
          description: UF de moradia (sigla 2 letras)
        propertyCity:
          type: string
          nullable: true
        propertyState:
          type: string
          nullable: true
          description: UF do imóvel pretendido (sigla 2 letras)
        alreadyOwnsPropertyInPropertyCity:
          type: boolean
          nullable: true
          description: Cliente já possui imóvel no município do imóvel pretendido (bloqueador MCMV)
