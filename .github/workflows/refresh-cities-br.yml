name: Refresh cities-br from IBGE

# Atualiza automaticamente o dataset de municípios brasileiros (`lib/cities-br/`)
# baixando os JSONs oficiais do IBGE e regenerando `cities-data.generated.ts`.
# Quando houver diferenças, abre um PR para revisão.
#
# Cadência: anual, alinhada à publicação da estimativa populacional do IBGE
# (geralmente em agosto). Também pode ser disparado manualmente.

on:
  schedule:
    # 03:00 UTC do dia 1º de setembro de cada ano.
    - cron: "0 3 1 9 *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: refresh
        run: |
          set +e
          pnpm --filter @workspace/cities-br run refresh:ibge
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          elif [ "$status" -eq 10 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            exit "$status"
          fi

      - if: steps.refresh.outputs.changed == 'true'
        run: pnpm --filter @workspace/cities-br exec tsc --noEmit -p tsconfig.json || true

      - if: steps.refresh.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/cities-br-ibge-refresh
          title: "chore(cities-br): atualizar dataset com dados mais recentes do IBGE"
          commit-message: "chore(cities-br): refresh IBGE dataset"
          body: |
            Atualização automática do dataset de municípios a partir dos JSONs
            oficiais do IBGE (`/localidades/municipios`, Censo 2022 variável 93
            e `/localidades/regioes-metropolitanas`).

            Gerado por `.github/workflows/refresh-cities-br.yml`.
          add-paths: |
            lib/cities-br/data/**
            lib/cities-br/src/cities-data.generated.ts

      # Se qualquer passo acima falhou (download HTTP, sanity-check de shape,
      # build do dataset etc.), abre/atualiza uma issue para que a quebra não
      # passe despercebida no log do GitHub Actions até a próxima janela anual.
      # Pode-se substituir/duplicar este passo por um webhook de Slack
      # (`slackapi/slack-github-action`) se desejado no futuro.
      - if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "[refresh-cities-br] atualização automática do IBGE falhou";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "O workflow `refresh-cities-br` falhou — provavelmente o IBGE mudou",
              "o formato de uma das fontes (`/localidades/municipios`, agregado 4709",
              "do Censo 2022 ou `/localidades/regioes-metropolitanas`) ou o endpoint",
              "ficou indisponível.",
              "",
              `Detalhes da execução: ${runUrl}`,
              "",
              "Próximos passos:",
              "- Rodar `pnpm --filter @workspace/cities-br run refresh:ibge` localmente",
              "  para reproduzir o erro.",
              "- Ajustar `lib/cities-br/scripts/refresh-from-ibge.ts` ao novo shape",
              "  (validadores e/ou `build-dataset.ts`).",
              "",
              "Esta issue é criada automaticamente pelo workflow agendado.",
            ].join("\n");
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "cities-br-refresh-failure",
              per_page: 1,
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Nova falha em ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["cities-br-refresh-failure"],
              });
            }
